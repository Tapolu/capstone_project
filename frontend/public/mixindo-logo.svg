  <!-- Wordmark -->
  <g transform="translate(0, 14)">
    <text x="128" y="226" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800" font-size="40" fill="#0b1a7a" letter-spacing="2">
      MIXINDO
    </text>
  </g>
